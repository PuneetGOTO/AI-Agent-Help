apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-platform-web
  namespace: agent-platform
  labels:
    app.kubernetes.io/name: agent-platform-web
    app.kubernetes.io/component: web
spec:
  replicas: 2
  revisionHistoryLimit: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agent-platform-web
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agent-platform-web
        app.kubernetes.io/component: web
    spec:
      serviceAccountName: agent-platform
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 30
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: web
          image: ghcr.io/example/enterprise-agent-platform-web:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: agent-platform-config
          startupProbe:
            httpGet:
              path: /login
              port: http
            failureThreshold: 30
            periodSeconds: 5
          readinessProbe:
            httpGet:
              path: /login
              port: http
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet:
              path: /login
              port: http
            periodSeconds: 20
            timeoutSeconds: 3
          resources:
            requests:
              cpu: 100m
              memory: 192Mi
            limits:
              cpu: '1'
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ['ALL']
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: agent-platform-web
  namespace: agent-platform
  labels:
    app.kubernetes.io/name: agent-platform-web
spec:
  selector:
    app.kubernetes.io/name: agent-platform-web
    app.kubernetes.io/component: web
  ports:
    - name: http
      port: 3000
      targetPort: http
  type: ClusterIP
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: agent-platform-web
  namespace: agent-platform
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: agent-platform-web
      app.kubernetes.io/component: web
