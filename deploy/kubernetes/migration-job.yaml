apiVersion: batch/v1
kind: Job
metadata:
  name: agent-platform-migrate
  namespace: agent-platform
  labels:
    app.kubernetes.io/name: agent-platform-api
    app.kubernetes.io/component: migration
spec:
  backoffLimit: 3
  ttlSecondsAfterFinished: 86400
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agent-platform-api
        app.kubernetes.io/component: migration
    spec:
      restartPolicy: Never
      serviceAccountName: agent-platform
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrate
          image: ghcr.io/example/enterprise-agent-platform-migration:0.1.0
          imagePullPolicy: IfNotPresent
          command: ['./node_modules/.bin/prisma', 'migrate', 'deploy']
          envFrom:
            - configMapRef:
                name: agent-platform-config
            - secretRef:
                name: agent-platform-secrets
          resources:
            requests:
              cpu: 100m
              memory: 192Mi
            limits:
              cpu: '1'
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ['ALL']
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
