# Example only. Never commit a populated Secret. Prefer External Secrets, Sealed
# Secrets, or your cloud secret manager in production.
apiVersion: v1
kind: Secret
metadata:
  name: agent-platform-secrets
  namespace: agent-platform
type: Opaque
stringData:
  DATABASE_URL: postgresql://USER:PASSWORD@POSTGRES_HOST:5432/agent_platform?schema=public&sslmode=require
  REDIS_URL: rediss://:PASSWORD@REDIS_HOST:6379/0
  S3_ENDPOINT: https://s3.example.com
  S3_ACCESS_KEY: REPLACE_ME
  S3_SECRET_KEY: REPLACE_ME
  JWT_ACCESS_SECRET: REPLACE_WITH_AT_LEAST_32_RANDOM_CHARACTERS
  JWT_REFRESH_SECRET: REPLACE_WITH_A_DIFFERENT_RANDOM_SECRET
  ENCRYPTION_KEY: REPLACE_WITH_BASE64_ENCODED_32_BYTE_KEY
  BOOTSTRAP_TOKEN: REPLACE_WITH_ONE_TIME_32_CHARACTER_MINIMUM_TOKEN
