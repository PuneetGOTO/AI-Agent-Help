apiVersion: v1
kind: ConfigMap
metadata:
  name: agent-platform-config
  namespace: agent-platform
data:
  NODE_ENV: production
  API_PORT: '4000'
  TRUST_PROXY_HOPS: '1'
  WEB_PORT: '3000'
  WEB_URL: https://agents.example.com
  API_URL: https://agents.example.com
  API_PROXY_URL: http://agent-platform-api:4000
  NEXT_PUBLIC_API_URL: https://agents.example.com/api/v1
  JWT_ACCESS_TTL: 15m
  JWT_REFRESH_TTL: 7d
  COOKIE_SECURE: 'true'
  S3_REGION: us-east-1
  S3_BUCKET: agent-platform-production
  S3_FORCE_PATH_STYLE: 'false'
  S3_ALLOW_INSECURE_INTERNAL_ENDPOINT: 'false'
  OPENAI_BASE_URL: https://api.openai.com/v1
  OPENAI_DEFAULT_MODEL: gpt-4.1-mini
  # Leave empty unless exact deployment-approved Ollama endpoints are required.
  OLLAMA_ALLOWED_BASE_URLS: ''
  # Optional exact HTTPS origins for deployment-controlled Bedrock proxies.
  BEDROCK_ALLOWED_ENDPOINTS: ''
