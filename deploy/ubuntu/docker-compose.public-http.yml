services:
  caddy:
    image: ${CADDY_IMAGE:-caddy:2-alpine@sha256:5f5c8640aae01df9654968d946d8f1a56c497f1dd5c5cda4cf95ab7c14d58648}
    restart: unless-stopped
    depends_on:
      web:
        condition: service_healthy
    ports:
      - '80:80'
    volumes:
      - ./deploy/ubuntu/Caddyfile.public-http:/etc/caddy/Caddyfile:ro
    networks:
      - frontend
