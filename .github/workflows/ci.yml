name: CI

on:
  push:
    branches: [main, master]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '10.14.0'
  POSTGRES_DB: agent_platform
  POSTGRES_USER: agent_platform
  POSTGRES_PASSWORD: agent_platform
  DATABASE_URL: postgresql://agent_platform:agent_platform@127.0.0.1:5432/agent_platform?schema=public
  REDIS_URL: redis://127.0.0.1:6379
  S3_ENDPOINT: http://127.0.0.1:9000
  S3_REGION: us-east-1
  S3_BUCKET: agent-platform
  S3_ACCESS_KEY: minioadmin
  S3_SECRET_KEY: minioadmin-change-me
  S3_FORCE_PATH_STYLE: 'true'
  JWT_ACCESS_SECRET: ci-access-secret-with-at-least-32-characters
  JWT_REFRESH_SECRET: ci-refresh-secret-with-at-least-32-characters
  JWT_ACCESS_TTL: 15m
  JWT_REFRESH_TTL: 7d
  ENCRYPTION_KEY: MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=
  COOKIE_SECURE: 'false'
  BOOTSTRAP_TOKEN: ci-bootstrap-token-with-at-least-32-characters
  OLLAMA_ALLOWED_BASE_URLS: http://127.0.0.1:4010/v1
  WEB_URL: http://127.0.0.1:3000
  API_URL: http://127.0.0.1:4000
  NEXT_PUBLIC_API_URL: http://127.0.0.1:4000/api/v1
  ADMIN_EMAIL: admin@example.com
  ADMIN_PASSWORD: ChangeMe123!
  ADMIN_NAME: CI Administrator
  DEFAULT_ORGANIZATION_NAME: CI Organization
  DEFAULT_WORKSPACE_NAME: CI Workspace

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: agent_platform
          POSTGRES_USER: agent_platform
          POSTGRES_PASSWORD: agent_platform
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agent_platform -d agent_platform"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 20
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm db:generate
      - run: pnpm --filter @agent-platform/api prisma:validate
      - run: pnpm db:deploy
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm test
      - run: pnpm build
      - run: docker compose config --quiet

  e2e:
    runs-on: ubuntu-latest
    needs: verify
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @agent-platform/e2e exec playwright install --with-deps chromium
      - name: Start infrastructure
        run: docker compose up -d postgres redis minio minio-init
      - run: pnpm db:generate
      - run: pnpm db:deploy
      - run: pnpm db:seed
      - run: pnpm build
      - name: Start application
        run: |
          node tests/e2e/fixtures/openai-compatible-server.mjs > mock-provider.log 2>&1 &
          pnpm --filter @agent-platform/api start:prod > api.log 2>&1 &
          pnpm --filter @agent-platform/web start > web.log 2>&1 &
      - name: Wait for health checks
        run: |
          timeout 120 bash -c 'until curl --fail --silent http://127.0.0.1:4000/api/v1/health; do sleep 2; done'
          timeout 120 bash -c 'until curl --fail --silent http://127.0.0.1:3000/login > /dev/null; do sleep 2; done'
          timeout 30 bash -c 'until curl --fail --silent http://127.0.0.1:4010/v1/models > /dev/null; do sleep 1; done'
      - name: Run Playwright
        run: pnpm test:e2e
        env:
          E2E_API_URL: http://127.0.0.1:4000/api/v1
          E2E_WEB_URL: http://127.0.0.1:3000
          E2E_ADMIN_EMAIL: ${{ env.ADMIN_EMAIL }}
          E2E_ADMIN_PASSWORD: ${{ env.ADMIN_PASSWORD }}
          E2E_MOCK_PROVIDER_URL: http://127.0.0.1:4010/v1
      - name: Upload diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-diagnostics
          path: |
            api.log
            web.log
            mock-provider.log
            playwright-report
            test-results
          if-no-files-found: ignore
          retention-days: 7
